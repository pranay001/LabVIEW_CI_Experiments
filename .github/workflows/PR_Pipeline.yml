name: LabVIEW Mass Compile

# Trigger: runs on every PR raised targeting the main branch.
# Also runs when new commits are pushed to an open PR.
on:
  pull_request:
    branches:
      - main

# Cancel any in-progress run for the same PR when a new
# commit is pushed - avoids queuing stale compile jobs.
concurrency:
  group: masscompile-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  mass-compile:
    name: MassCompile LabVIEW Code
    runs-on: self-hosted   # Windows PC with LabVIEW installed

    steps:

      # --------------------------------------------------------
      # STEP 1: Checkout the PR branch code
      # --------------------------------------------------------
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # --------------------------------------------------------
      # STEP 2: Create log output directory
      # --------------------------------------------------------
      - name: Create log directory
        shell: powershell
        run: |
          $logDir = "${{ github.workspace }}\logs"
          if (-not (Test-Path $logDir)) {
            New-Item -ItemType Directory -Path $logDir | Out-Null
          }
          Write-Host "Log directory ready: $logDir"

      # --------------------------------------------------------
      # STEP 3: Run MassCompile
      # -LabVIEWPath is omitted - on Windows the CLI connects
      # to the most recently started LabVIEW instance automatically.
      # -PortNumber is omitted - uses the default port 3363.
      # --------------------------------------------------------
      - name: MassCompile LabVIEW VIs
        shell: powershell
        run: |
          $cli     = "C:\Program Files (x86)\National Instruments\Shared\LabVIEW CLI\LabVIEWCLI.exe"
          $logFile = "${{ github.workspace }}\logs\masscompile.log"
          $srcDir  = "${{ github.workspace }}"

          Write-Host "Starting MassCompile..."
          Write-Host "  Source   : $srcDir"
          Write-Host "  Log file : $logFile"

          & $cli `
            -OperationName          MassCompile `
            -DirectoryToCompile     $srcDir `
            -MassCompileLogFile     $logFile `
            -AppendToMassCompileLog false `
            -LogFilePath            "${{ github.workspace }}\logs\cli.log" `
            -LogToConsole           true `
            -Verbosity              Detailed

          $exitCode = $LASTEXITCODE
          Write-Host "MassCompile exit code: $exitCode"

          if ($exitCode -ne 0) {
            Write-Error "MassCompile failed with exit code $exitCode"
            exit $exitCode
          }

          Write-Host "MassCompile completed successfully."

      # --------------------------------------------------------
      # STEP 4: Parse log and report errors as annotations.
      # Runs only on failure - surfaces Bad VI lines directly
      # in the PR Checks tab.
      # --------------------------------------------------------
      - name: Annotate PR with compile errors
        if: failure()
        shell: powershell
        run: |
          $logFile = "${{ github.workspace }}\logs\masscompile.log"

          if (-not (Test-Path $logFile)) {
            Write-Host "No log file found - skipping annotation."
            exit 0
          }

          $lines = Get-Content $logFile
          $issues = $lines | Where-Object {
            $_ -match "(?i)(error|failed|cannot|broken|missing|Bad VI)"
          }

          if ($issues) {
            Write-Host "::group::MassCompile Issues Found"
            foreach ($issue in $issues) {
              Write-Host "::error::$issue"
            }
            Write-Host "::endgroup::"
          } else {
            Write-Host "No specific error lines found in log."
          }

      # --------------------------------------------------------
      # STEP 5: Close LabVIEW - always runs, even on failure.
      # Prevents orphaned LabVIEW processes on the runner.
      # --------------------------------------------------------
      - name: Close LabVIEW
        if: always()
        shell: powershell
        run: |
          $cli = "C:\Program Files (x86)\National Instruments\Shared\LabVIEW CLI\LabVIEWCLI.exe"
          & $cli -OperationName CloseLabVIEW
          Write-Host "LabVIEW close attempted."

      # --------------------------------------------------------
      # STEP 6: Upload MassCompile + CLI logs as PR artifact.
      # Available under Actions > your run > Artifacts.
      # --------------------------------------------------------
      - name: Upload compile logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: masscompile-logs-pr${{ github.event.pull_request.number }}-${{ github.run_number }}
          path: |
            ${{ github.workspace }}\logs\masscompile.log
            ${{ github.workspace }}\logs\cli.log
          retention-days: 14
          if-no-files-found: warn
